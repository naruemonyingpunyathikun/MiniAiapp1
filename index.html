<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        #webcam-container {
            margin: 20px auto;
            width: 200px;
            height: 200px;
            border: 2px solid #ccc;
            background-color: #eee;
        }
        #label-container div {
            font-size: 18px;
            margin: 5px;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Teachable Machine Image Model</h2>
    <button type="button" onclick="init()">เริ่มเปิดกล้อง (Start)</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลของคุณจาก Teachable Machine (ตรวจสอบให้แน่ใจว่าลงท้ายด้วย / เสมอ)
        const URL = "https://teachablemachine.withgoogle.com/models/bYgWWG7NH/";

        let model, webcam, labelContainer, maxPredictions;

        // ฟังก์ชันเริ่มต้น โหลดโมเดลและตั้งค่าเว็บแคม
        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                // โหลดโมเดล
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // ตั้งค่าเว็บแคม
                const flip = true; // พลิกซ้ายขวาเหมือนกระจกเงา
                webcam = new tmImage.Webcam(200, 200, flip); 
                
                await webcam.setup(); // ขออนุญาตเข้าถึงกล้อง
                await webcam.play();
                window.requestAnimationFrame(loop);

                // แสดงหน้าจอเว็บแคมใน HTML
                const webcamContainer = document.getElementById("webcam-container");
                webcamContainer.innerHTML = ""; // ล้างข้อมูลเก่าก่อนหน้า (ถ้ามี)
                webcamContainer.appendChild(webcam.canvas);
                
                // เตรียมพื้นที่สำหรับแสดงผลลัพธ์คำทำนาย
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
                for (let i = 0; i < maxPredictions; i++) { 
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดโมเดลหรือกล้อง:", error);
                alert("ไม่สามารถเข้าถึงกล้อง หรือลิงก์โมเดลไม่ถูกต้อง กรุณารันผ่าน Local Server (HTTP/HTTPS)");
            }
        }

        // ฟังก์ชัน Loop ทำงานต่อเนื่องเพื่ออัปเดตเฟรมภาพ
        async function loop() {
            webcam.update(); // อัปเดตภาพจากเว็บแคม
            await predict();
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันทำนายภาพ
        async function predict() {
            // ส่งภาพจาก Canvas ของเว็บแคมเข้าไปให้โมเดลทำนาย
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // แสดงชื่อคลาส และค่าความน่าจะเป็น (แปลงเป็นเปอร์เซ็นต์เพื่อให้ดูง่ายขึ้น)
                const className = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(2);
                
                labelContainer.childNodes[i].innerHTML = `${className}: ${probability}%`;
            }
        }
    </script>
</body>
</html>
